spring:
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console #localhost:8080/h2-console
  jpa:
    hibernate:
      ddl-auto: create-drop #cria as tabelas ao subir e deleta ao terminar
    show-sql: true #mostra os comandinho SQL no terminal tipo select * from coisinha